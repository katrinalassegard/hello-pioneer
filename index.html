<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pioneer Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080812;
      color: #d8e0ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      background: linear-gradient(135deg, #00d4ff, #d600aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px;
      text-align: center;
    }

    /* ── Post form ── */
    .form-card {
      background: #0f0f24;
      border: 1px solid #1a1a3a;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 32px;
      box-shadow: 0 0 0 1px rgba(0,212,255,.03), 0 8px 32px rgba(0,0,0,.5);
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #4a5590;
      margin-bottom: 12px;
      display: block;
    }

    .form-card input,
    .form-card textarea {
      width: 100%;
      background: #080812;
      border: 2px solid #1a1a3a;
      border-radius: 10px;
      color: #d8e0ff;
      font-family: inherit;
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      margin-bottom: 10px;
      resize: vertical;
    }

    .form-card input::placeholder,
    .form-card textarea::placeholder { color: #262650; }

    .form-card input:focus,
    .form-card textarea:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 0 3px rgba(0,212,255,.12);
    }

    .form-card textarea { min-height: 90px; }

    .submit-btn {
      background: #00d4ff;
      color: #020210;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      padding: 11px 24px;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, box-shadow .15s;
      box-shadow: 0 0 12px rgba(0,212,255,.35);
      width: 100%;
    }
    .submit-btn:hover { background: #00b0d8; box-shadow: 0 0 20px rgba(0,212,255,.55); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Notes list ── */
    .notes-header {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #4a5590;
      margin-bottom: 12px;
    }

    .note-card {
      background: #0f0f24;
      border: 1px solid #1a1a3a;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
      animation: fade-in .2s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }

    .note-title {
      font-size: 16px;
      font-weight: 700;
      color: #d8e0ff;
      margin-bottom: 6px;
    }

    .note-body {
      font-size: 14px;
      color: #8899cc;
      line-height: 1.55;
    }

    .note-date {
      font-size: 11px;
      color: #2a3060;
      margin-top: 10px;
    }

    .empty-state {
      text-align: center;
      color: #2a3060;
      font-size: 14px;
      padding: 40px 0;
    }

    .status-msg {
      font-size: 13px;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
    }
    .status-msg.error   { background: #1a0512; color: #ff2d55; display: block; }
    .status-msg.success { background: #001a0e; color: #00ff99; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pioneer Notes</h1>

    <div class="form-card">
      <span class="form-label">New note</span>
      <div id="status" class="status-msg"></div>
      <form id="note-form">
        <input  id="title" type="text"  placeholder="Title"            required />
        <textarea id="body"             placeholder="What's on your mind?" required></textarea>
        <button class="submit-btn" type="submit" id="submit-btn">Post Note</button>
      </form>
    </div>

    <div class="notes-header">Latest notes</div>
    <div id="notes-list"></div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
